  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    border: 2px solid #e2e8f0;
    background: white;

    color: #718096;
    background: #f5f7fa;
  }
  .stats span { font-weight: 700; color: #2b6cb0; }

    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
    padding: 20px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border: 1px solid #e2e8f0;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  .card.hidden { display: none; }

  .card-header { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1rem; color: white;
    flex-shrink: 0;
  }
  .card-name { font-weight: 700; font-size: 1rem; color: #1a202c; }
  .card-source { font-size: 0.75rem; color: #a0aec0; }

  .card-quote {
    font-size: 0.9rem;
    line-height: 1.6;
    color: #4a5568;
    flex: 1;
    font-style: italic;
    border-left: 3px solid #e2e8f0;
    padding-left: 12px;
  }
  .card-quote mark {
    background: #fefcbf;
    border-radius: 2px;
    padding: 0 2px;
  }

  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 12px;
    font-weight: 600;
    text-transform: uppercase;

  .tag-theme { background: #f0fff4; color: #276749; }
  .tag-sport { background: #faf5ff; color: #6b46c1; }

    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: #a0aec0;
  }
  .no-results h3 { font-size: 1.2rem; margin-bottom: 8px; color: #718096; }

  .highlight-search { background: #fef08a; border-radius: 2px; }

// Build tag lists
const allBodyTags = [...new Set(testimonials.flatMap(t => t.body))].sort();
const allThemeTags = [...new Set(testimonials.flatMap(t => t.theme))].sort();
const allSportTags = [...new Set(testimonials.flatMap(t => t.sport).filter(Boolean))].sort();

let activeBody = new Set();
let activeTheme = new Set();
let activeSport = new Set();

function avatarColor(name) {
  const colors = ['#e53e3e','#dd6b20','#d69e2e','#38a169','#2b6cb0','#6b46c1','#d53f8c','#319795','#744210','#2d3748'];
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return colors[Math.abs(h) % colors.length];
}

function buildChips(container, tags, activeSet, onToggle) {
  const el = document.getElementById(container);
  el.innerHTML = '';
  tags.forEach(tag => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (activeSet.has(tag) ? ' active' : '');
    chip.textContent = tag;
    chip.onclick = () => { onToggle(tag); filterAll(); };
    el.appendChild(chip);
  });
}

function highlightText(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function filterAll() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  let shown = 0;
  document.querySelectorAll('.card').forEach((card, i) => {
    const t = testimonials[i];
    const searchStr = [t.name, t.quote, ...t.body, ...t.theme, ...t.sport].join(' ').toLowerCase();
    const matchQuery = !query || searchStr.includes(query);
    const matchBody = activeBody.size === 0 || t.body.some(b => activeBody.has(b));
    const matchTheme = activeTheme.size === 0 || t.theme.some(b => activeTheme.has(b));
    const matchSport = activeSport.size === 0 || t.sport.some(b => activeSport.has(b));
    const visible = matchQuery && matchBody && matchTheme && matchSport;
    card.classList.toggle('hidden', !visible);
    if (visible) {
      shown++;
      card.querySelector('.card-quote').innerHTML = '"' + highlightText(t.quote, query) + '"';
    }
  });
  document.getElementById('countShown').textContent = shown;
  const noRes = document.getElementById('noResults');
  if (noRes) noRes.style.display = shown === 0 ? 'block' : 'none';

  // Rebuild chips to reflect active state
  buildChips('bodyChips', allBodyTags, activeBody, tag => activeBody.has(tag) ? activeBody.delete(tag) : activeBody.add(tag));
  buildChips('themeChips', allThemeTags, activeTheme, tag => activeTheme.has(tag) ? activeTheme.delete(tag) : activeTheme.add(tag));
  buildChips('sportChips', allSportTags, activeSport, tag => activeSport.has(tag) ? activeSport.delete(tag) : activeSport.add(tag));
}

function init() {
  const grid = document.getElementById('grid');
  testimonials.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const initials = t.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const bodyTags = t.body.map(b => `<span class="tag tag-body">${b}</span>`).join('');
    const themeTags = t.theme.map(th => `<span class="tag tag-theme">${th}</span>`).join('');
    const sportTags = t.sport.map(s => `<span class="tag tag-sport">${s}</span>`).join('');
    card.innerHTML = `
      <div class="card-header">
        <div class="avatar" style="background:${avatarColor(t.name)}">${initials}</div>
        <div>
          <div class="card-name">${t.name}</div>
          <div class="card-source">${t.source}</div>
        </div>
      </div>
      <div class="card-quote">"${t.quote}"</div>
      <div class="card-tags">${bodyTags}${themeTags}${sportTags}</div>
    `;
    grid.appendChild(card);
  });

  // Add no-results placeholder
  const noRes = document.createElement('div');
  noRes.id = 'noResults';
  noRes.className = 'no-results';
  noRes.style.display = 'none';
  noRes.innerHTML = '<h3>No testimonials match your search</h3><p>Try different keywords or clear the filters above</p>';
  grid.appendChild(noRes);

  document.getElementById('countTotal').textContent = testimonials.length;
  document.getElementById('countShown').textContent = testimonials.length;

  buildChips('bodyChips', allBodyTags, activeBody, tag => activeBody.has(tag) ? activeBody.delete(tag) : activeBody.add(tag));
  buildChips('themeChips', allThemeTags, activeTheme, tag => activeTheme.has(tag) ? activeTheme.delete(tag) : activeTheme.add(tag));
  buildChips('sportChips', allSportTags, activeSport, tag => activeSport.has(tag) ? activeSport.delete(tag) : activeSport.add(tag));
}

init();
</script>
